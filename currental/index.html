<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="search">
        <div class="title">
            <h1>Car Rental</h1>
            <p>Find the perfect car for your next adventure</p>
            <hr>
        </div>
        <div class="form-container">
            <div class="form-group">
                <label for="pickup">Rental Location:</label>
                <select id="pickup" name="pickup">
                    <option value="">Select Location</option>
                    <option value="location1">Yogyakarta</option>
                    <option value="location2">Bali</option>
                </select>
            </div>
            <div class="form-group">
                <label for="pickup-date">Rental Start Date:</label>
                <input type="date" id="pickup-date" name="pickup-date">
            </div>
            <div class="form-group">
                <label for="return-date">Rental End Date:</label>
                <input type="date" id="return-date" name="return-date">
            </div>
            <button type="submit">Search</button>
        </div>
    </div>

    <div class="car-list">
        <h2>Car List</h2>
        <div class="car-item">
            <img src="../cars ' 2006.jpg" alt="Car 1">
            <h3>Tow Matter</h3>
            <p>Pilihan yang tepat disaat mobil mogok</p>
        </div>
        <div class="car-item">
            <img src="../download.jpg" alt="Car 2">
            <h3>Fabulous Mcqueen</h3>
            <p>Mau balap? pilih mcqueen</p>
        </div>
        <div class="car-item">
            <img src="../Jackson Storm as El Diablo.jpg" alt="Car 2">
            <h3>Jackson Storm</h3>
            <p>Kalau mcqueen sold, pilih lah Storm</p>
        </div>
        <div class="car-item">
            <img src="../Personagens de Carros_ conheça nomes e características (1).jpg" alt="Car 2">
            <h3>Car 2</h3>
            <p>beautiful car</p>
        </div>
    </div>
</body>

</html>
